name: Release PR Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

jobs:
  require-pre-release-source:
    name: Require pre-release source
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          if [ "${{ github.repository }}" != "MoyuFamily/ai-relay" ]; then
            echo "Release PR source enforcement is only enabled for the upstream repository."
            exit 0
          fi

          if [ "${{ github.head_ref }}" != "pre-release" ]; then
            echo "PRs targeting main must come from pre-release."
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi
