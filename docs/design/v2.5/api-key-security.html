<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Relay v2.5 — API Key 安全管理 UI 设计稿</title>
<style>
/* ===== Design Tokens (dark glassmorphism, consistent with iter 1-4) ===== */
:root {
  --bg: #09090b;
  --bg-radial: radial-gradient(circle at top, #1e293b, #09090b);
  --panel: rgba(30,41,59,.45);
  --panel-hover: rgba(30,41,59,.6);
  --line: rgba(255,255,255,.08);
  --line-active: rgba(96,165,250,.45);
  --text: #e5e7eb;
  --muted: #9ca3af;
  --dim: #6b7280;
  --blue: #60a5fa;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --gray: #6b7280;
  --violet: #8b5cf6;
  --security-purple: #a78bfa;
  --gradient-primary: linear-gradient(135deg, #2563eb, var(--violet));
  --gradient-active: linear-gradient(135deg, rgba(59,130,246,.16), rgba(139,92,246,.16));
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-pill: 999px;
  --shadow-panel: 0 4px 30px rgba(0,0,0,.35);
  --blur: blur(12px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-radial); background-attachment: fixed;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  line-height: 1.6; min-height: 100vh;
}
.wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }
.section-title {
  font-size: 14px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin: 36px 0 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.section-title:first-child { margin-top: 0; }

/* ===== Shared Panel ===== */
.panel {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 24px;
  backdrop-filter: var(--blur); box-shadow: var(--shadow-panel);
  margin-bottom: 20px;
}
.panel:hover { background: var(--panel-hover); }

/* ===== Status Badge ===== */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 600;
}
.status-badge .dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; position: relative;
}
.status-badge .dot::after {
  content: ""; position: absolute; inset: -3px;
  border-radius: 50%; opacity: .3;
}
.status-healthy  { background: rgba(52,211,153,.1); color: var(--green); }
.status-healthy .dot  { background: var(--green); }
.status-healthy .dot::after  { border: 2px solid var(--green); animation: pulse-g 2s infinite; }
.status-warning { background: rgba(251,191,36,.1); color: var(--yellow); }
.status-warning .dot { background: var(--yellow); }
.status-warning .dot::after { border: 2px solid var(--yellow); animation: pulse-y 2s infinite; }
.status-critical { background: rgba(248,113,113,.1); color: var(--red); }
.status-critical .dot { background: var(--red); }
.status-critical .dot::after { border: 2px solid var(--red); animation: pulse-r 1.5s infinite; }
.status-encrypted { background: rgba(167,139,250,.1); color: var(--security-purple); }
.status-encrypted .dot { background: var(--security-purple); }
@keyframes pulse-g { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.6;transform:scale(1.4)} }
@keyframes pulse-y { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
@keyframes pulse-r { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:.8;transform:scale(1.5)} }

/* ===== Stats Cards ===== */
.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
.stat-card {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 20px;
  backdrop-filter: var(--blur); transition: all .2s;
}
.stat-card:hover { background: var(--panel-hover); transform: translateY(-2px); }
.stat-icon { font-size: 28px; margin-bottom: 10px; }
.stat-value { font-size: 28px; font-weight: 800; line-height: 1.2; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
.stat-sub { font-size: 11px; color: var(--dim); margin-top: 8px; }

/* ===== Key List Table ===== */
.key-table {
  width: 100%; border-collapse: collapse;
}
.key-table th {
  text-align: left; font-size: 11px; color: var(--dim);
  text-transform: uppercase; letter-spacing: .5px;
  padding: 8px 12px; border-bottom: 1px solid var(--line);
}
.key-table td {
  padding: 12px; border-bottom: 1px solid rgba(255,255,255,.03);
  font-size: 13px; vertical-align: middle;
}
.key-row { transition: background .15s; position: relative; }
.key-row:hover { background: rgba(255,255,255,.02); }
.key-row.critical { border-left: 3px solid var(--red); }
.key-row.critical td:first-child { padding-left: 9px; }

/* Key mask */
.key-mask {
  font-family: 'SF Mono', Monaco, monospace; font-size: 12px;
  color: var(--muted); letter-spacing: 1px;
}

/* Usage bar */
.usage-bar {
  width: 80px; height: 4px; background: rgba(255,255,255,.06);
  border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle;
}
.usage-bar-fill { height: 100%; border-radius: 2px; }

/* ===== Rotation Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.modal {
  background: rgba(15,23,42,.95); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 32px;
  backdrop-filter: blur(20px); width: 520px; max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.modal-title {
  font-size: 18px; font-weight: 700; margin-bottom: 4px;
  background: var(--gradient-primary); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

/* Input field */
.input-field {
  width: 100%; padding: 10px 14px; background: rgba(0,0,0,.3);
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  color: var(--text); font-size: 13px; outline: none;
  transition: border-color .2s;
}
.input-field:focus { border-color: var(--blue); }
.input-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }

/* Button styles */
.btn-primary {
  padding: 8px 20px; border-radius: var(--radius-sm);
  background: var(--gradient-primary); color: #fff;
  font-size: 13px; font-weight: 600; border: none; cursor: pointer;
  transition: opacity .2s;
}
.btn-primary:hover { opacity: .9; }
.btn-ghost {
  padding: 8px 20px; border-radius: var(--radius-sm);
  background: transparent; color: var(--muted);
  font-size: 13px; border: 1px solid var(--line); cursor: pointer;
  transition: all .15s;
}
.btn-ghost:hover { background: var(--panel-hover); color: var(--text); }
.btn-danger {
  padding: 8px 20px; border-radius: var(--radius-sm);
  background: rgba(248,113,113,.15); color: var(--red);
  font-size: 13px; font-weight: 600; border: 1px solid rgba(248,113,113,.3); cursor: pointer;
}

/* ===== Audit Log ===== */
.log-entry {
  display: flex; gap: 16px; padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.03);
  font-size: 13px; align-items: flex-start;
}
.log-time { color: var(--dim); font-size: 12px; min-width: 140px; font-family: 'SF Mono', Monaco, monospace; }
.log-type {
  padding: 2px 8px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 600; min-width: 64px; text-align: center;
}
.log-type-rotate { background: rgba(96,165,250,.1); color: var(--blue); }
.log-type-add { background: rgba(52,211,153,.1); color: var(--green); }
.log-type-pause { background: rgba(251,191,36,.1); color: var(--yellow); }
.log-type-alert { background: rgba(248,113,113,.1); color: var(--red); }
.log-detail { color: var(--text); flex: 1; }
.log-actor { color: var(--dim); font-size: 12px; min-width: 60px; text-align: right; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .stats-grid { grid-template-columns: 1fr; }
  .key-table { display: block; }
  .key-table thead { display: none; }
  .key-table tbody { display: block; }
  .key-row { display: block; padding: 16px; margin-bottom: 10px; border-radius: var(--radius-md); background: var(--panel); border: 1px solid var(--line); }
  .key-row td { display: flex; justify-content: space-between; padding: 4px 0; border: none; }
}
</style>
</head>
